<style>
  html, body {
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
    user-select: none;
  }
</style>
<script>
  (() => {
    const block = (e) => e.preventDefault();
    document.addEventListener("copy", block);
    document.addEventListener("cut", block);
    document.addEventListener("contextmenu", block);
    document.addEventListener("selectstart", block);
    document.addEventListener("dragstart", block);
    document.addEventListener("keydown", (e) => {
      const key = (e.key || "").toLowerCase();
      if ((e.ctrlKey || e.metaKey) && (key === "c" || key === "x" || key === "u" || key === "s" || key === "p")) {
        e.preventDefault();
      }

      if (key === "printscreen") {
        e.preventDefault();
        flashProtection();
      }
    });

    let flashTimer;
    const flashProtection = () => {
      document.body.classList.add("kb-screenshot-blur");
      clearTimeout(flashTimer);
      flashTimer = setTimeout(() => {
        document.body.classList.remove("kb-screenshot-blur");
      }, 700);
    };

    const addWatermark = () => {
      if (document.querySelector(".kb-screenshot-watermark")) return;
      const wm = document.createElement("div");
      wm.className = "kb-screenshot-watermark";
      document.body.appendChild(wm);
      wm.style.display = "block";
    };

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", addWatermark);
    } else {
      addWatermark();
    }

    const isVisible = (el) => {
      const rect = el.getBoundingClientRect();
      return rect.width > 0 && rect.height > 0;
    };

    const ensureSidebarItemVisible = (detailsEl) => {
      const scrollContainer = detailsEl.closest(".hextra-sidebar-container")?.querySelector(".hextra-scrollbar");
      if (!scrollContainer || !detailsEl.open) return;

      const alignVisibleArea = () => {
        const targetCandidates = Array.from(detailsEl.querySelectorAll("a, summary")).filter(isVisible);
        const targetEl = targetCandidates[targetCandidates.length - 1] || detailsEl;
        const containerRect = scrollContainer.getBoundingClientRect();
        const targetRect = targetEl.getBoundingClientRect();
        const bottomOffset = 28;
        const topOffset = 12;

        if (targetRect.bottom > containerRect.bottom - bottomOffset) {
          scrollContainer.scrollTop += targetRect.bottom - (containerRect.bottom - bottomOffset);
        } else if (targetRect.top < containerRect.top + topOffset) {
          scrollContainer.scrollTop -= (containerRect.top + topOffset) - targetRect.top;
        }
      };

      requestAnimationFrame(() => requestAnimationFrame(alignVisibleArea));
    };

    document.addEventListener("toggle", (event) => {
      const detailsEl = event.target;
      if (!(detailsEl instanceof HTMLDetailsElement)) return;
      if (!detailsEl.classList.contains("kb-tree-details")) return;
      ensureSidebarItemVisible(detailsEl);
    }, true);
  })();
</script>
